{% extends "base.html" %}
{% block title %}İlan Düzenle - Araba Dünyası{% endblock %}
{% block content %}
<section class="form-page">
    <div class="form-card">
        <h1>İlanı Düzenle</h1>
        <p>Araç ilanının bilgilerini güncelleyin.</p>
        
        <form method="post">
            <div class="field-row grid-2">
                <div>
                    <label for="marka">Marka</label>
                    <input type="text" id="marka" name="marka" value="{{ ad.marka }}" required />
                </div>
                <div>
                    <label for="seri">Seri</label>
                    <input type="text" id="seri" name="seri" value="{{ ad.seri }}" required />
                </div>
            </div>
            
            <div class="field-row">
                <label for="model">Model</label>
                <input type="text" id="model" name="model" value="{{ ad.model }}" required />
            </div>
            
            <div class="field-row grid-2">
                <div>
                    <label for="yil">Yıl</label>
                    <input type="number" id="yil" name="yil" value="{{ ad.yil }}" required />
                </div>
                <div>
                    <label for="fiyat">Fiyat (TL)</label>
                    <input type="number" id="fiyat" name="fiyat" value="{{ ad.fiyat }}" required />
                </div>
            </div>
            
            <div class="field-row grid-2">
                <div>
                    <label for="yakit">Yakıt Tipi</label>
                    <input type="text" id="yakit" name="yakit" value="{{ ad.yakit }}" required />
                </div>
                <div>
                    <label for="transmission">Vites</label>
                    <input type="text" id="transmission" name="transmission" value="{{ ad.transmission }}" required />
                </div>
            </div>
            
            <div class="field-row grid-2">
                <div>
                    <label for="kilometre">Kilometre</label>
                    <input type="number" id="kilometre" name="kilometre" value="{{ ad.kilometre }}" required />
                </div>
                <div>
                    <label for="renk">Renk</label>
                    <input type="text" id="renk" name="renk" value="{{ ad.renk }}" required />
                </div>
            </div>
            
            <div class="field-row grid-2">
                <div>
                    <label for="kasa">Kasa Tipi</label>
                    <input type="text" id="kasa" name="kasa" value="{{ ad.kasa }}" required />
                </div>
                <div>
                    <label for="motorgucu">Motor Gücü</label>
                    <input type="text" id="motorgucu" name="motorgucu" value="{{ ad.motorgucu }}" required />
                </div>
            </div>
            
            <div class="field-row">
                <label for="cekis">Çekiş Tipi</label>
                <input type="text" id="cekis" name="cekis" value="{{ ad.cekis }}" required />
            </div>
            
            <div class="field-row">
                <label for="description">Açıklama</label>
                <textarea id="description" name="description" rows="4" required>{{ ad.description }}</textarea>
            </div>
            
            <div class="field-row">
                <label for="email">E-posta</label>
                <input type="email" id="email" name="email" value="{{ ad.email }}" required />
            </div>
            
            <div class="field-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <button type="submit" class="button">Güncelle</button>
                <a href="{{ url_for('dashboard') }}" class="button button-secondary" style="text-align: center; text-decoration: none;">İptal</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
